<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlPlot Studio - Interactive Control System Visualization</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎛️ ControlPlot Studio</h1>
            <p>Interactive Control System Visualization Platform</p>
        </header>

        <div class="main-grid">
            <!-- Left Panel: Input -->
            <div class="panel input-panel">
                <h2>Transfer Function</h2>
                
                <div class="input-section">
                    <h3>Method 1: Direct Entry</h3>
                    <div class="input-group">
                        <label>Numerator coefficients (e.g., 10, 20):</label>
                        <input type="text" id="numerator-input" placeholder="10, 20" value="10, 20">
                    </div>
                    <div class="input-group">
                        <label>Denominator coefficients (e.g., 1, 3, 2):</label>
                        <input type="text" id="denominator-input" placeholder="1, 3, 2" value="1, 3, 2">
                    </div>
                    <button onclick="loadTransferFunction()">Generate Plots</button>
                </div>

                <hr>

                <div class="input-section">
                    <h3>Method 2: Builder</h3>
                    <div class="input-group">
                        <label>Gain:</label>
                        <input type="number" id="gain-input" value="10" step="0.1">
                    </div>
                    
                    <div class="input-group">
                        <label>Zeros:</label>
                        <div id="zeros-container">
                            <div class="builder-row">
                                <input type="text" class="zero-input" placeholder="Zero value" value="2">
                                <button onclick="addZero()">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Poles:</label>
                        <div id="poles-container">
                            <div class="builder-row">
                                <input type="text" class="pole-input" placeholder="Pole value" value="1">
                                <button onclick="addPole()">+</button>
                            </div>
                            <div class="builder-row">
                                <input type="text" class="pole-input" placeholder="Pole value" value="5">
                                <button onclick="addPole()">+</button>
                            </div>
                        </div>
                    </div>
                    <button onclick="loadFromBuilder()">Build & Generate</button>
                </div>

                <hr>

                <div class="input-section">
                    <h3>Example Library</h3>
                    <div class="example-buttons">
                        <button onclick="loadExample('rc_lowpass')">RC Low Pass</button>
                        <button onclick="loadExample('rc_highpass')">RC High Pass</button>
                        <button onclick="loadExample('second_order')">Second Order</button>
                        <button onclick="loadExample('integrator')">Integrator</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Plots -->
            <div class="panel plots-panel">
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('bode')">Bode Plot</button>
                    <button class="tab-btn" onclick="showTab('nyquist')">Nyquist Plot</button>
                    <button class="tab-btn" onclick="showTab('polezero')">Pole-Zero Map</button>
                    <button class="tab-btn" onclick="showTab('info')">System Info</button>
                </div>

                <div id="bode-tab" class="tab-content active">
                    <div id="bode-magnitude" class="plot-container"></div>
                    <div id="bode-phase" class="plot-container"></div>
                </div>

                <div id="nyquist-tab" class="tab-content">
                    <div id="nyquist-plot" class="plot-container"></div>
                </div>

                <div id="polezero-tab" class="tab-content">
                    <div id="polezero-plot" class="plot-container"></div>
                </div>

                <div id="info-tab" class="tab-content">
                    <div id="system-info" class="info-container">
                        <p>Load a transfer function to see system information</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
